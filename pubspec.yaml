name: tinysaver_kids
description: "TinySaver Kids - Saving made fun for kids"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_crashlytics: ^4.3.10

  # State Management
  flutter_riverpod: ^2.6.1

  # Animations & UI
  confetti: ^0.7.0
  animated_text_kit: ^4.2.3
  lottie: ^3.3.1

  # Utils
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  intl: ^0.18.1
  pinput: ^5.0.0
  audioplayers: ^6.1.0
  pdf: ^3.11.1
  printing: ^5.13.4
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
